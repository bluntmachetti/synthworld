name: Feature request
description: Propose a generator, schema, or benchmark change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What evaluation gap or workflow does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Benchmark and schema impact
      description: >-
        Would this change frozen benchmark bytes, checksums, or a versioned
        schema contract? Contract changes need a deliberately reviewed
        version bump.
    validations:
      required: true
